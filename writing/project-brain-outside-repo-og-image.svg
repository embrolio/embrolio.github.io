<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#64ffda" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#64ffda" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#64ffda" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#64ffda" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#64ffda" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#64ffda" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#64ffda" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#64ffda" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#64ffda" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#64ffda" stroke-width="1"/>
  </g>
  <!-- Visual element: folder with strikethrough → ticket card -->
  <g transform="translate(160, 220)">
    <!-- Folder icon with strikethrough -->
    <rect x="0" y="10" width="50" height="35" rx="3" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
    <rect x="0" y="5" width="20" height="10" rx="2" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
    <line x1="-5" y1="50" x2="55" y2="0" stroke="#ff6b6b" stroke-width="2.5" opacity="0.8"/>
  </g>
  <!-- Arrow -->
  <g transform="translate(260, 240)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#64ffda" stroke-width="2.5"/>
    <polygon points="40,-6 52,0 40,6" fill="#64ffda"/>
  </g>
  <!-- Ticket card -->
  <g transform="translate(340, 220)">
    <rect x="0" y="0" width="55" height="45" rx="4" fill="none" stroke="#64ffda" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="15" x2="55" y2="15" stroke="#64ffda" stroke-width="1.5" opacity="0.5"/>
    <rect x="8" y="22" width="20" height="4" rx="1" fill="#64ffda" opacity="0.4"/>
    <rect x="8" y="30" width="35" height="4" rx="1" fill="#6b6979" opacity="0.4"/>
  </g>
  <!-- Accent line -->
  <rect x="200" y="295" width="800" height="2" fill="url(#accent-line)" rx="1"/>
  <!-- Article title - 3 lines -->
  <text x="600" y="350" font-family="Georgia, serif" font-size="42" font-weight="600" fill="#e8e6e3" text-anchor="middle">Stop Keeping Your</text>
  <text x="600" y="400" font-family="Georgia, serif" font-size="42" font-weight="600" fill="#e8e6e3" text-anchor="middle">Project Brain Inside</text>
  <text x="600" y="450" font-family="Georgia, serif" font-size="42" font-weight="600" fill="#e8e6e3" text-anchor="middle">Your Project</text>
  <!-- Site branding -->
  <text x="600" y="520" font-family="Georgia, serif" font-size="20" fill="#6b6979" text-anchor="middle">brolio.dev</text>
  <!-- Corner braces -->
  <text x="60" y="590" font-family="monospace" font-size="28" fill="#64ffda" opacity="0.4">{</text>
  <text x="1120" y="590" font-family="monospace" font-size="28" fill="#64ffda" opacity="0.4">}</text>
</svg>
